<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>יוצר ההדמיות · HoloAcademy</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0f; overflow: hidden; }
  #root { height: 100%; overflow: hidden; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="splash-screen.jsx"></script>
<script type="text/babel" src="home-screen.jsx"></script>
<script type="text/babel" src="student-screen.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="library.jsx"></script>
<script type="text/babel" src="students.jsx"></script>
<script type="text/babel" src="analytics.jsx"></script>
<script type="text/babel" src="loading-screen.jsx"></script>
<script type="text/babel" src="variation-a.jsx"></script>

<script type="text/babel">
  function RootApp() {
    const [screen,      setScreen]      = React.useState('home');
    const [animKey,     setAnimKey]     = React.useState(0);
    const [showSplash,  setShowSplash]  = React.useState(true);
    const [homeVisible, setHomeVisible] = React.useState(false);

    const navigate = (to, r) => {
      setAnimKey(k => k + 1);
      setScreen(to);
    };

    return (
      <>
        {/* underlying screens — always mounted, opacity controlled */}
        <div key={animKey} style={{ position:'absolute', inset:0,
          opacity:    homeVisible ? 1 : 0,
          transition: homeVisible ? 'opacity 1.1s ease' : 'none',
          pointerEvents: showSplash ? 'none' : 'auto',
        }}>
          {screen === 'home' && (
            <window.HoloHomeScreen onSelect={(r) => navigate(r === 'teacher' ? 'studio' : 'student', r)} />
          )}
          {screen === 'studio' && (
            <window.VariationA onLogout={() => navigate('home')} />
          )}
          {screen === 'student' && (
            <window.HoloStudentScreen onLogout={() => navigate('home')} />
          )}
        </div>

        {/* splash overlay — sits on top, removed when done */}
        {showSplash && (
          <window.HoloSplash
            onDisintegrate={() => setHomeVisible(true)}
            onDone={() => setShowSplash(false)}
          />
        )}
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<RootApp />);
</script>
</body>
</html>
