<style>
  @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
  html, body { margin: 0; height: 100%; background: #02040a; overflow: hidden; font-family: 'Rubik', system-ui, sans-serif; }
  #stage { position: fixed; inset: 0; }

  /* layered backdrop */
  .bg { position: absolute; inset: 0; z-index: 0; }
  .bg-grad { background:
      radial-gradient(120% 80% at 50% 8%, rgba(20,52,96,.55) 0%, rgba(8,18,40,.4) 38%, rgba(2,4,10,0) 70%),
      radial-gradient(90% 70% at 50% 120%, rgba(255,128,40,.16) 0%, rgba(2,4,10,0) 55%),
      #02040a; }
  .bg-grid { opacity: .14; background-image:
      linear-gradient(rgba(80,200,255,.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(80,200,255,.5) 1px, transparent 1px);
    background-size: 64px 64px; mask-image: radial-gradient(80% 70% at 50% 45%, #000 30%, transparent 78%);
    -webkit-mask-image: radial-gradient(80% 70% at 50% 45%, #000 30%, transparent 78%); }
  .vignette { box-shadow: inset 0 0 320px 60px rgba(2,4,10,.95); }

  /* rain canvas sits above bg, below content text but glow reads through */
  #rain { position: absolute; inset: 0; z-index: 3; pointer-events: none; }

  /* victory content */
  .content { position: absolute; inset: 0; z-index: 2; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; }
  .halo { position: absolute; width: 760px; height: 760px; border-radius: 50%;
    background: radial-gradient(circle, rgba(47,243,255,.18), rgba(47,243,255,.05) 42%, transparent 66%);
    filter: blur(8px); animation: pulse 4.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(.94); opacity: .8; } 50% { transform: scale(1.06); opacity: 1; } }

  .eyebrow { font-family: 'Space Mono', monospace; font-size: 15px; letter-spacing: .42em;
    text-transform: uppercase; color: #6fe9ff; text-shadow: 0 0 18px rgba(47,243,255,.7); margin-bottom: 18px; }
  .title { font-size: 132px; font-weight: 900; line-height: .92; margin: 0; letter-spacing: -.01em;
    background: linear-gradient(180deg, #ffffff 0%, #bff4ff 48%, #4fc8ff 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 36px rgba(47,243,255,.55)); }
  .subtitle { margin: 20px 0 0; font-size: 25px; font-weight: 500; color: #cfe9f7;
    text-shadow: 0 2px 18px rgba(0,0,0,.6); }
  .subtitle b { color: #ffd9a0; font-weight: 700; }

  .crystal-row { display: flex; gap: 26px; margin-top: 52px; align-items: flex-end; }
  .crystal-row .slot { width: 86px; }
  .crystal-row .slot svg { width: 100%; height: auto; display: block;
    filter: drop-shadow(0 0 16px rgba(47,243,255,.85)); animation: bob 3.2s ease-in-out infinite; }
  .crystal-row .slot:nth-child(2) svg { animation-delay: .4s; }
  .crystal-row .slot:nth-child(3) svg { animation-delay: .8s; }
  .crystal-row .slot:nth-child(4) svg { animation-delay: 1.2s; }
  .crystal-row .slot:nth-child(5) svg { animation-delay: 1.6s; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

  .meta { margin-top: 46px; display: flex; align-items: center; gap: 30px;
    font-family: 'Space Mono', monospace; font-size: 14px; color: rgba(155,210,235,.6); letter-spacing: .12em; }
  .meta .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(110,233,255,.6); }
  .meta b { color: #eafaff; font-size: 18px; }

  .tag { position: fixed; top: 24px; right: 28px; z-index: 6; font-family: 'Space Mono', monospace;
    font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: rgba(150,210,235,.45); }
</style>

    row.innerHTML = PAL.map((_, i) => `<div class="slot">${svg(i)}</div>`).join('');
  }
  buildRow();

  // ── crystal rain (seamless perpetual loop) ────────────────────────────────
  const canvas = document.getElementById('rain');
  const ctx = canvas.getContext('2d');
  let W, H, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const TAU = Math.PI * 2;

  function start() {
    if (!window.CRYSTAL_D) return setTimeout(start, 40);
    const VB = window.CRYSTAL_VB || [0,0,220,210];
    const CRW = VB[2], CRH = VB[3];
    const crPath = new Path2D(window.CRYSTAL_D);
    // solid silhouette (hull) for the body fill — the line-art alone is open subpaths
    const hullPath = new Path2D();
    {
      const pts = window.CRYSTAL_HULL.trim().split(/\s+/).map(s => s.split(',').map(Number));
      pts.forEach(([x, y], i) => i ? hullPath.lineTo(x, y) : hullPath.moveTo(x, y));
      hullPath.closePath();
    }

    // brand-colour palettes — cyan / magenta / gold, each a light + dark variant
    const PALETTES = [
      { top: '#e6fbff', mid: '#6fe2ff', bot: '#1fb4f0', shadow: 'rgba(60,225,255,0.9)',  edge: 'rgba(238,253,255,0.95)' }, // cyan light
      { top: '#b6ecfb', mid: '#34bfe6', bot: '#0c79b4', shadow: 'rgba(30,160,210,0.85)', edge: 'rgba(206,243,255,0.9)' },  // cyan dark
      { top: '#ffe4f8', mid: '#ff7ae0', bot: '#e23aa2', shadow: 'rgba(255,90,220,0.85)', edge: 'rgba(255,233,250,0.95)' }, // magenta light
      { top: '#f3b6e2', mid: '#d243b2', bot: '#8f2079', shadow: 'rgba(200,50,160,0.8)',  edge: 'rgba(255,221,246,0.9)' },  // magenta dark
      { top: '#fff4d4', mid: '#ffd470', bot: '#f0a022', shadow: 'rgba(255,195,80,0.85)', edge: 'rgba(255,247,224,0.95)' }, // gold light
      { top: '#f1d79e', mid: '#dd9f34', bot: '#a86a12', shadow: 'rgba(205,150,45,0.8)',  edge: 'rgba(255,240,214,0.9)' },  // gold dark
    ];

    const COUNT = 34;
    const drops = [];
    function spawn(initial) {
      const sz = 0.10 + Math.pow(Math.random(), 1.6) * 0.34;   // scale (depth)
      return {
        x: Math.random() * W,
        y: initial ? Math.random() * H : -CRH * sz - Math.random() * 240,
        s: sz,
        vy: (38 + sz * 150) ,                                  // px/sec, bigger = faster (closer)
        drift: (Math.random() - 0.5) * 26,
        rot: Math.random() * TAU,
        vr: (Math.random() - 0.5) * 1.1,
        sway: Math.random() * TAU,
        swaySpeed: 0.4 + Math.random() * 0.8,
        alpha: 0.45 + sz * 1.4,
        pal: PALETTES[(Math.random() * PALETTES.length) | 0],
      };
    }
    for (let i = 0; i < COUNT; i++) drops.push(spawn(true));

    function drawCrystal(d) {
      const p = d.pal;
      const scale = (Math.min(W, H) / 1100) * (d.s * 2.4);
      ctx.save();
      ctx.globalAlpha = Math.min(1, d.alpha);
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rot);
      ctx.scale(scale, scale);
      ctx.translate(-CRW / 2, -CRH / 2);
      // body
      ctx.shadowColor = p.shadow; ctx.shadowBlur = 18 + d.s * 40;
      const g = ctx.createLinearGradient(0, 0, CRW * 0.2, CRH);
      g.addColorStop(0, p.top); g.addColorStop(0.42, p.mid); g.addColorStop(1, p.bot);
      ctx.fillStyle = g; ctx.fill(hullPath);
      ctx.shadowBlur = 0;
      // facet edges
      ctx.lineJoin = 'round'; ctx.lineCap = 'round';
      ctx.strokeStyle = p.edge; ctx.lineWidth = 8;
      ctx.stroke(crPath);
      ctx.restore();
    }

    let last = performance.now();
    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000); last = now;
      ctx.clearRect(0, 0, W, H);
      // far → near so closer (bigger) crystals overlap on top
      drops.sort((a, b) => a.s - b.s);
      for (const d of drops) {
        d.y += d.vy * dt;
        d.sway += d.swaySpeed * dt;
        d.x += (d.drift + Math.sin(d.sway) * 18) * dt;
        d.rot += d.vr * dt;
        if (d.y - CRH * d.s > H + 60) Object.assign(d, spawn(false));
        drawCrystal(d);
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }
  start();
})();
</script>
